  .field-input:focus{outline:none;border-color:#2d5a9e}
  .panel{background:#0f1e35;border:1px solid #1e3a5f;border-radius:12px;padding:20px}
  .section-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-family:'Georgia',serif;font-weight:bold}

// ── ML Model ─────────────────────────────────────────────────────────────────
function trainModel(data){
  const features=["age","sex","surgical","scr","crmdr","sepsis","ventilator","apache3","saps3","rifle","akin"];
  const stats={};
  features.forEach(f=>{
    const v=data.map(d=>d[f]);
    const mean=v.reduce((a,b)=>a+b,0)/v.length;
    const std=Math.sqrt(v.reduce((a,b)=>a+(b-mean)**2,0)/v.length)||1;
    stats[f]={mean,std};
  });
  const norm=(val,f)=>(val-stats[f].mean)/stats[f].std;
  let W=new Array(features.length).fill(0),bias=0;
  const sig=z=>1/(1+Math.exp(-Math.max(-500,Math.min(500,z))));
  for(let e=0;e<2000;e++){
    let dW=new Array(features.length).fill(0),dB=0;
    data.forEach(d=>{
      const x=features.map(f=>norm(d[f],f));
      const z=x.reduce((s,xi,i)=>s+xi*W[i],0)+bias;
      const err=sig(z)-d.dialysis;
      x.forEach((xi,i)=>dW[i]+=err*xi);
      dB+=err;
    });
    W=W.map((w,i)=>w-0.05*dW[i]/data.length);
    bias-=0.05*dB/data.length;
  }
  const predict=inp=>{
    const x=features.map(f=>norm(inp[f]||0,f));
    const z=x.reduce((s,xi,i)=>s+xi*W[i],0)+bias;
    return sig(z);
  };
  const totalW=W.reduce((s,w)=>s+Math.abs(w),0);
  const importance=features.map((f,i)=>({feature:f,importance:Math.abs(W[i])/totalW*100,positive:W[i]>0})).sort((a,b)=>b.importance-a.importance);
  const preds=data.map(d=>({score:predict(d),label:d.dialysis}));
  preds.sort((a,b)=>b.score-a.score);
  const pos=preds.filter(p=>p.label===1).length,neg=preds.length-pos;
  let tp=0,fp=0,auc=0,pTp=0,pFp=0;
  preds.forEach(p=>{if(p.label===1)tp++;else{fp++;auc+=(tp+pTp)/2*(fp-pFp);pTp=tp;pFp=fp;}});
  auc/=(pos*neg);
  let TP=0,TN=0,FP=0,FN=0;
  preds.forEach(p=>{const pr=p.score>=0.5?1:0;if(pr===1&&p.label===1)TP++;else if(pr===0&&p.label===0)TN++;else if(pr===1)FP++;else FN++;});
  const sens=TP/(TP+FN)||0,spec=TN/(TN+FP)||0,ppv=TP/(TP+FP)||0,npv=TN/(TN+FN)||0;
  return{predict,importance,auc,metrics:{sens,spec,ppv,npv,TP,TN,FP,FN}};
}

// ── Gauge ─────────────────────────────────────────────────────────────────────
function Gauge({prob}){
  const c=riskColor(prob),pct=(prob*100).toFixed(1);
  const r=70,cx=90,cy=88;
  const total=Math.PI*r,dash=prob*total;
  return React.createElement('svg',{width:180,height:100,viewBox:"0 0 180 100"},
    React.createElement('path',{d:`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`,fill:"none",stroke:"#1e3a5f",strokeWidth:14,strokeLinecap:"round"}),
    React.createElement('path',{d:`M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy}`,fill:"none",stroke:c,strokeWidth:14,strokeLinecap:"round",strokeDasharray:`${dash} ${total}`,style:{transition:"stroke-dasharray 0.8s ease"}}),
    React.createElement('text',{x:cx,y:cy-4,textAnchor:"middle",fill:c,fontSize:22,fontWeight:"bold",fontFamily:"Georgia"},[pct,"%"].join("")),
    React.createElement('text',{x:cx,y:cy+14,textAnchor:"middle",fill:"#64748b",fontSize:9,fontFamily:"Georgia"},"DIALYSIS RISK")
  );
}

          }catch(e){}
